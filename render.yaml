services:
  - type: web
    name: fincowry-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fincowry-db
          property: connectionString

databases:
  - name: fincowry-db
    plan: free
